{{- if .Values.ingress.enabled -}}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ include "frontend.fullname" . }}-route
  labels:
    app: {{ include "frontend.fullname" . }}
spec:
  parentRefs:
    - name: {{ .Values.ingress.gatewayName }}
      namespace: {{ .Values.ingress.gatewayNamespace }}
  {{- if .Values.ingress.hostname }}
  hostnames:
    - {{ .Values.ingress.hostname | quote }}
  {{- end }}
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: {{ include "frontend.fullname" . }}
          port: 80
{{- end }}
